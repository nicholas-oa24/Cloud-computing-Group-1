<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - PharmaCare</title>
    <link rel="stylesheet" href="style.css">

    <!-- Internal Styling -->
    <style>
        /* General Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f7f9fc;
            color: #333;
            line-height: 1.6;
        }

        /* Top Navigation Bar */
        .topnav {
            background-color: #0072b5;
            overflow: hidden;
            border-radius: 8px;
            margin: 20px auto;
            max-width: 1200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .topnav a {
            float: left;
            display: block;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s, color 0.3s;
        }

        .topnav a:hover {
            background-color: #005f8d;
            color: #fff;
        }

        .topnav a.active {
            background-color: #ffb700;
            color: #000;
        }

        /* Logo Styling */
        .logo {
            width: 60px;
            height: auto;
            vertical-align: middle;
            border-radius: 50%;
            margin-right: 15px;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
            color: #0072b5;
        }

        /* Form Styling */
        form {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        label {
            font-weight: bold;
            color: #0072b5;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
            font-size: 1rem;
        }

        textarea {
            min-height: 120px;
        }

        button {
            background-color: #ffb700;
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #ffaa00;
            transform: scale(1.05);
        }

        /* Section Styling */
        section h2 {
            color: #0072b5;
            margin-bottom: 20px;
            text-align: center;
        }

        section a {
            color: #ff7f50;
            text-decoration: none;
            font-weight: bold;
        }

        section a:hover {
            text-decoration: underline;
        }

        section img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        section img:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Footer Styling */
        footer {
            background: #0072b5;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            border-radius: 8px 8px 0 0;
        }

        @media (max-width: 600px) {
            form {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="topnav" id="myTopnav">
  <a href="home.html">Home</a>
  <a href="products.html">Products</a>
  <a href="services.html">Services</a>
  <a href="about.html">About</a>
  <a href="contact.html" class="active">Contact</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">&#9776;</a>
</div>

<main>
    <h1>
        <img src="images/logo.jpg" alt="phar logo" class="logo" style="box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        Contact PharmaCare
    </h1>

    <form>
        <label>Name:</label><br>
        <input type="text" placeholder="Enter your full name"><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email"><br>

        <label>Message:</label><br>
        <textarea placeholder="Write your message here..."></textarea><br>

        <button type="submit">Send</button>
    </form>

    <section>
        <h2>Click on 
            <a href="https://maps.app.goo.gl/HND4xodF4Wze5vmx8?g_st=ipc" target="_blank">location</a> to get directions to our place
        </h2>
        <img src="images/location.jpg" alt="PharmaCare Location">
    </section>

</main>

<footer class="flow">
    <p>© 2025 PharmaCare Ltd</p>
</footer>

<script src="navbar.js"></script>
</body>
</html>

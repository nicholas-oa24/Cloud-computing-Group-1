<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Us - PharmaCare</title>
    <link rel="stylesheet" href="style.css">

    <!-- Internal Styling -->
    <style>
        /* General Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f7f9fc;
            color: #333;
            line-height: 1.6;
        }

        /* Top Navigation Bar */
        .topnav {
            background-color: #0072b5;
            overflow: hidden;
            border-radius: 8px;
            margin: 20px auto;
            max-width: 1200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .topnav a {
            float: left;
            display: block;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s, color 0.3s;
        }

        .topnav a:hover {
            background-color: #005f8d;
            color: #fff;
        }

        .topnav a.active {
            background-color: #ffb700;
            color: #000;
        }

        /* Logo Styling */
        .logo {
            width: 60px;
            height: auto;
            vertical-align: middle;
            border-radius: 50%;
            margin-right: 15px;
        }

        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
            color: #0072b5;
        }

        /* Columns Section */
        .columns {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 50px;
        }

        .columns article {
            background: #fff;
            padding: 20px;
            flex: 1 1 250px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .columns article:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.2);
        }

        .columns h3 {
            color: #ff7f50;
            margin-bottom: 10px;
        }

        /* Images Section */
        div img {
            border-radius: 12px;
            margin: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        div img:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* Footer */
        footer {
            background: #0072b5;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            border-radius: 8px 8px 0 0;
        }

        /* Responsive Images */
        @media (max-width: 900px) {
            div img {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>

<body>

<div class="topnav" id="myTopnav">
  <a href="home.html">Home</a>
  <a href="products.html">Products</a>
  <a href="services.html">Services</a>
  <a href="about.html" class="active">About</a>
  <a href="contact.html">Contact</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">&#9776;</a>
</div>

<main>
    <h1>
        <img src="images/logo.jpg" alt="phar logo" class="logo" style="box-shadow: 0 4px 10px rgba(0,0,0,0.3);"> 
        About PharmaCare Ltd
    </h1>

    <section class="columns">
        <article style="background: linear-gradient(135deg, #e0f7fa, #fff);">
            <h3>Our Mission</h3>
            <p>To provide affordable, safe and effective medicines.</p>
        </article>
        <article style="background: linear-gradient(135deg, #fff0f5, #fff);">
            <h3>Our Vision</h3>
            <p>To be Ghana’s leading pharmaceutical company.</p>
        </article>
        <article style="background: linear-gradient(135deg, #f0fff0, #fff);">
            <h3>Our Values</h3>
            <p>Integrity, Excellence and Innovation.</p>
        </article>
    </section>

    <div style="text-align:center;">
        <img src="images/ph2.jpg" width="35%" height="400px" alt="Pharmaceutical Worker">
        <img src="images/ph3.jpg" width="30%" height="400px" alt="Pharmaceutical Worker">
        <img src="images/ph1.jpg" width="35%" height="400px" alt="Pharmaceutical Worker">
    </div>

</main>

<footer class="flow">
    <p>© 2025 PharmaCare Ltd</p>
</footer>

<script src="navbar.js"></script>
</body>
</html>
